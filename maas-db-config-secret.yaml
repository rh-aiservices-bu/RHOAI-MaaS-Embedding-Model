---
# MaaS reads this secret for PostgreSQL connection details used by API-key
# lifecycle management. It MUST live in the redhat-ods-applications namespace
# and be named maas-db-config.
#
# Connection string format:
#   postgresql://<username>:<password>@<hostname>:<port>/<database>?sslmode=<mode>
#
# The hostname below is the in-cluster Service FQDN from postgres-deployment.yaml:
#   <service>.<namespace>.svc.cluster.local
#
# NOTE on sslmode: the rhel9/postgresql image is not configured for TLS by
# default, so this uses sslmode=disable for in-cluster traffic. If you front
# the database with TLS (or use an external managed PostgreSQL), change this to
# sslmode=require and ensure the username/password match postgres-credentials.
apiVersion: v1
kind: Secret
metadata:
  name: maas-db-config
  namespace: redhat-ods-applications
type: Opaque
stringData:
  DB_CONNECTION_URL: "postgresql://maasadmin:ChangeMe-StrongPassword@postgres.maas-postgres.svc.cluster.local:5432/maasdb?sslmode=disable"
