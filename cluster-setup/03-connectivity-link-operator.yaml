---
# Red Hat Connectivity Link operator (Kuadrant). Provides the API gateway
# auth/rate-limiting (Authorino + Limitador) that MaaS uses to enforce API-key
# authentication and token rate limits. Installs cluster-wide into
# openshift-operators (which already has a global OperatorGroup).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhcl-operator
  namespace: openshift-operators
spec:
  channel: stable
  name: rhcl-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
