---
# GatewayClass for the OpenShift Gateway Controller. On some clusters a class
# (e.g. openshift-default or data-science-gateway-class) already exists with this
# controller; if so you can reference that one instead and delete this block.
# Defining our own keeps the manifest self-contained on a fresh cluster.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: maas-gateway-class
spec:
  controllerName: openshift.io/gateway-controller/v1
---
# The MaaS API gateway. Must be named maas-default-gateway and live in the
# openshift-ingress namespace. The MaaS platform reconcile (DSC modelsAsService)
# blocks until this Gateway exists. Two annotations are required:
#   - opendatahub.io/managed: "false"
#       Prevents the ODH Model Controller from overriding MaaS-managed
#       authorization policies.
#   - security.opendatahub.io/authorino-tls-bootstrap: "true"
#       Enables TLS between the Gateway and Authorino (the MaaS controller
#       creates an EnvoyFilter for this).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
  annotations:
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
spec:
  gatewayClassName: maas-gateway-class
  listeners:
    # HTTPS listener terminating TLS using the cluster's default ingress
    # wildcard cert (cert-manager-ingress-cert), which covers *.apps.<domain>.
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "maas.apps.cluster-pwnhx.pwnhx.sandbox79.opentlc.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: cert-manager-ingress-cert
