---
# Red Hat build of OpenTelemetry — provides the OpenTelemetryCollector CRD that
# the OpenShift AI monitoring service requires to provision the metrics
# collector. Cluster-scoped (AllNamespaces) install into openshift-operators.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: opentelemetry-product
  namespace: openshift-operators
spec:
  channel: stable
  name: opentelemetry-product
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
